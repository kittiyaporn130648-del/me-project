<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Guess Game</title>
</head>
<body style="text-align:center; font-family:Arial;">

<h1>🎮 เกมทายเลข 1-100</h1>

<input id="name" placeholder="ชื่อผู้เล่น"><br><br>

<button onclick="start()">เริ่มเกม</button>

<p id="session"></p>

<input id="guess" type="number" placeholder="ใส่เลข"><br><br>
<button onclick="guess()">ทาย</button>

<h2 id="result"></h2>

<script>
let sessionId = "";

async function start() {
  const res = await fetch('/api/new-game', { method: 'POST' });
  const data = await res.json();

  sessionId = data.session_id;
  document.getElementById("session").innerText = "Session: " + sessionId;
}

async function guess() {
  const name = document.getElementById("name").value;
  const g = document.getElementById("guess").value;

  const res = await fetch('/api/guess', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      sessionId: sessionId,
      playerName: name,
      guess: g
    })
  });

  const data = await res.json();
  document.getElementById("result").innerText = data.message;
}
</script>

</body>
</html>
