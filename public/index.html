<!DOCTYPE html>
<html>
<head>
  <title>Smart Guess Game</title>
</head>
<body>

<h1>🎮 Smart Guessing Game</h1>

<div id="login">
  <input id="name" placeholder="ชื่อคุณ">
  <button onclick="start()">เริ่มเกม</button>
</div>

<div id="game" style="display:none;">
  <input id="guess" type="number">
  <button onclick="guess()">ทาย</button>
  <p id="result"></p>
  <p id="hint"></p>
</div>

<h2>🏆 Leaderboard</h2>
<ul id="board"></ul>

<script src="script.js"></script>
</body>
</html>
